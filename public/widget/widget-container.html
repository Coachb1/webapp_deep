
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Widget</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #chat-container2 {
        display: block !important;
        position: static !important;
        width: 100% !important;
        height: 100% !important;
        scale: 1 !important;
        box-shadow: none !important;
        border-radius: 0 !important;
      }

      #chat-icon2,
      #close-top2 {
        display: none !important;
      }

      #chat {
        display: none; /* hidden until widgetReady */
        position: relative;
        width: 100%;
        height: 100%;
        background: #f9f9f9; /* fallback background */
      }

      #loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #fff;
        z-index: 9999;
      }

      #loader_text {
        margin-bottom: 30px;
        font-size: 18px;
        font-weight: 500;
        color: #333;
      }

      .wave-loader {
        display: flex;
        gap: 6px;
      }

      .wave-loader span {
        display: block;
        width: 10px;
        height: 40px;
        background: rgb(87, 223, 160);
        border-radius: 4px;
        animation: wave 1.2s ease-in-out infinite;
      }

      .wave-loader span:nth-child(1) { animation-delay: 0s; }
      .wave-loader span:nth-child(2) { animation-delay: 0.1s; }
      .wave-loader span:nth-child(3) { animation-delay: 0.2s; }
      .wave-loader span:nth-child(4) { animation-delay: 0.3s; }
      .wave-loader span:nth-child(5) { animation-delay: 0.4s; }

      @keyframes wave {
        0%, 40%, 100% { transform: scaleY(0.3); }
        20% { transform: scaleY(1); }
      }
    </style>
  </head>
  <body>
    <div id="loader">
      <div id="loader_text">Initializing AI Coach...</div>
      <div class="wave-loader">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div id="chat" class="coachbots-coachscribe" data-bot-switch-button="true"></div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // ----------------------------
        // 1. Config parsing
        // ----------------------------
        const urlParams = new URLSearchParams(window.location.search);
        const pathname = window.location.origin;

        const config = {
          type: urlParams.get("type") || "coach_bot",
          origin: urlParams.get("origin") || "external",
          user: JSON.parse(urlParams.get("user") || "null"),
          botId:
            urlParams.get("botId") ||
            "avatar-bot-36f8d-emphasizing-luxury--confidence-the-radiance-edit",
        };

        console.log("Widget config:", config);

        // expose globally if widget script needs it
        window.user = config.user;
        window.origin = config.origin;

        // ----------------------------
        // 2. Widget injection
        // ----------------------------
        const script = document.createElement("script");
        script.src = `${pathname}/widget/coachbots-stt-widget-combined.js`;
        script.defer = true;
        document.head.appendChild(script);

        // ----------------------------
        // 3. UI setup
        // ----------------------------
        const chatEl = document.getElementById("chat");
        if (chatEl) {
          chatEl.dataset.botId = config.botId;
          console.log("BotId set to:", chatEl.dataset.botId);
        }

        window.widgetReady = function () {
          document.getElementById("loader").style.display = "none";
          if (chatEl) chatEl.style.display = "block";
        };

        // fallback auto-show
        const start = Date.now();
        const delay = config.user ? 10000 : 5000;
        setTimeout(() => {
          const elapsed = ((Date.now() - start) / 1000).toFixed(2);
          console.log(`widgetReady ran after ${elapsed}s (fallback)`);
          window.widgetReady();
        }, delay);
      });
    </script>
  </body>
</html>
