<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Widget</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #chat-container2 {
        display: block !important;
        position: static !important;
        width: 100% !important;
        height: 100% !important;
        scale: 1 !important;
        box-shadow: none !important;
        border-radius: 0 !important;
      }

      #chat-icon2,
      #close-top2 {
        display: none !important;
      }
    </style>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const pathname = window.location.origin;
      const type = urlParams.get('type') || 'coach_bot'
      const origin = urlParams.get("origin") || "external";
      const user = JSON.parse(urlParams.get("user"));
      const botid = urlParams.get('botId') || 'avatar-bot-36f8d-emphasizing-luxury--confidence-the-radiance-edit'

      console.log("decwindow", window.location);
      console.log("pathname from query:", pathname);

      // Dynamically inject the widget script
      const script = document.createElement("script");
      script.src = `${pathname}/widget/coachbots-stt-widget-new.js`;
      script.defer = true;
      document.head.appendChild(script);

      
      if (type === 'coach_bot') window.botId = botid;
      window.user = user;
      window.origin = origin;
    </script>
  </head>
  <body>
    <div class="coachbots-coachscribe"></div>
  </body>
</html>
